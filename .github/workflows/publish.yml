name: Publish

# Publish to npm via Trusted Publishing (OIDC) when a version tag (vX.Y.Z) is
# pushed. No npm token: GitHub Actions authenticates to npm over OIDC, so there
# is nothing long-lived to leak. Requires a Trusted Publisher configured on the
# package (npmjs.com -> package -> Settings -> Trusted Publisher):
#   org/user: hojoongdev   repo: rowset-diff   workflow: publish.yml
#
# Release flow:
#   npm version patch      # bumps package.json + creates the vX.Y.Z tag
#   git push --follow-tags # pushes the commit and the tag -> this runs
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC token for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # trusted publishing needs Node >= 22.14
          registry-url: https://registry.npmjs.org
      - run: npm ci

      # Guard: the pushed tag must match the version in package.json, so a
      # forgotten version bump can never publish a mislabelled release.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1; }

      - run: npm test

      # Trusted publishing needs npm >= 11.5.1 (newer than the CLI bundled with
      # Node). Upgrade, then publish over OIDC — no NODE_AUTH_TOKEN, provenance
      # is attached automatically.
      - run: npm install -g npm@latest
      - run: npm publish
