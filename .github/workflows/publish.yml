name: Publish

# Publish to npm when a version tag (vX.Y.Z) is pushed.
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci

      # Guard: the pushed tag must match the version in package.json, so a
      # forgotten version bump can never publish a mislabelled release.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1; }

      - run: npm test

      # prepublishOnly builds dist/. --provenance links the published package to
      # this commit + workflow run (verifiable supply-chain attestation).
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
